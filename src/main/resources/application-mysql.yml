spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/baseplatform?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai}
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:root}
    druid:
      driver-class-name: com.mysql.cj.jdbc.Driver
      url: ${MYSQL_URL:jdbc:mysql://localhost:3306/baseplatform?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai}
      username: ${MYSQL_USERNAME:root}
      password: ${MYSQL_PASSWORD:root}
      initial-size: 1
      min-idle: 1
      max-active: 20
      validation-query: select 1
    initialization-mode: always
    schema: classpath:db/mysql/schema.sql
